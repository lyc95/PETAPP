version: "3.8"

services:
  devcontainer:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/workspace/backend/target
      - uploads:/workspace/uploads
    command: sleep infinity
    environment:
      RUST_LOG: debug
      DATABASE_URL: postgres://catcare:dev@postgres:5432/catcare
      JWT_SECRET: dev-secret-change-in-prod
      UPLOAD_DIR: /workspace/uploads
      PORT: "9000"
      ANDROID_ADB_SERVER_ADDRESS: host.docker.internal
      ANDROID_ADB_SERVER_PORT: 5037
    ports:
      - "9000:9000"
      - "8081:8081"
      - "8082:8082"
    networks:
      - catcare
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: catcare
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: catcare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - catcare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catcare"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  catcare:

volumes:
  cargo-registry:
  cargo-git:
  backend-target:
  postgres-data:
  uploads:
